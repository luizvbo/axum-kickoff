# Pre-commit hooks for axum-kickoff
# Install prek: cargo install prek
# Run: prek install
# Skip: SKIP=cargo-fmt git commit ...

fail_fast = false

# Priority 0: Read-only hooks and file type-specific fixers
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-merge-conflict" },
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files", args = ["--maxkb=1000"] },
]

# Spell checking
[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.47.1"
hooks = [
  { id = "typos" },
]

# GitHub Actions workflow validation
[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.2"
hooks = [
  { id = "check-github-workflows" },
]

# GitHub Actions linting
[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"
hooks = [
  { id = "actionlint" },
]

# Rust formatting
[[repos]]
repo = "local"
[[repos.hooks]]
id = "rustfmt"
name = "rustfmt"
entry = "cargo fmt --manifest-path Cargo.toml"
language = "system"
pass_filenames = false

# Rust clippy linting
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets --all-features --manifest-path Cargo.toml"
language = "system"
pass_filenames = false

# Rust documentation check
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-doc"
name = "cargo doc"
entry = "cargo doc --no-deps --document-private-items --manifest-path Cargo.toml"
language = "system"
pass_filenames = false

# Cargo deny check (dependencies)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-deny"
name = "cargo deny"
entry = "cargo deny check"
language = "system"
pass_filenames = false

# Cargo machete (unused dependencies)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete"
entry = "cargo machete"
language = "system"
pass_filenames = false
