# Pre-commit hooks for axum-kickoff
# Install pre-commit: pip install pre-commit
# Run: pre-commit install
# Skip: SKIP=cargo-fmt git commit ...

fail_fast: false

repos:
  # Priority 0: Read-only hooks and file type-specific fixers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.1
    hooks:
      - id: typos

  # GitHub Actions workflow validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-github-workflows

  # GitHub Actions linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Rust formatting
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: rustfmt
        language: system
        types: [rust]

  # Rust clippy linting
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features
        language: system
        pass_filenames: false

  # Rust documentation check
  - repo: local
    hooks:
      - id: cargo-doc
        name: cargo doc
        entry: cargo doc --no-deps --document-private-items
        language: system
        pass_filenames: false

  # Cargo deny check (dependencies)
  - repo: local
    hooks:
      - id: cargo-deny
        name: cargo deny
        entry: cargo deny check
        language: system
        pass_filenames: false

  # Cargo machete (unused dependencies)
  - repo: local
    hooks:
      - id: cargo-machete
        name: cargo machete
        entry: cargo machete
        language: system
        pass_filenames: false
