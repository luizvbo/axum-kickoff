[package]
name = "axum-kickoff"
authors = ["Luiz Otavio V. B. Oliveira <luiz.vbo@gmail.com>"]
version = "0.1.0"
edition = "2021"
repository = "https://github.com/luizvbo/axum-kickoff"

[dependencies]
axum = "0.7"
axum-extra = { version = "0.9", features = ["either"] }
tikv-jemallocator = "0.6"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.5", features = ["trace", "cors", "compression", "timeout", "catch-panic"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
cookie = "0.18"
derive_more = "1"
