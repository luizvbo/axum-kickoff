<!-- Partial template: Contact form validation errors -->
<!-- This is returned as HTML fragment when form submission fails validation -->

<div class="alert alert-error">
    <div class="alert-icon">⚠</div>
    <div class="alert-content">
        <h4>Please fix the following errors:</h4>
        <ul class="error-list">
            {% for error in errors %}
            <li class="error-item">{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
